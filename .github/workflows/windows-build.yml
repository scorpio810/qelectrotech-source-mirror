name: Windows Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Node 24 opt-in before the June 2, 2026 forced migration deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------------------------------------------
      # MSYS2 / UCRT64 environment
      # update: false  → skip the full system upgrade that was causing the
      #                  "Failed to restore: operation cannot be completed in
      #                  timeout" cache error.  Packages already pinned by the
      #                  runner image are recent enough for our purposes.
      # -----------------------------------------------------------------------
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false          # was: true  — avoids cache-restore timeout
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt5-base
            mingw-w64-ucrt-x86_64-qt5-svg
            mingw-w64-ucrt-x86_64-qt5-tools
            mingw-w64-ucrt-x86_64-qt5-translations
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-kwidgetsaddons
            mingw-w64-ucrt-x86_64-kcoreaddons
            mingw-w64-ucrt-x86_64-extra-cmake-modules
            mingw-w64-ucrt-x86_64-nsis

      # Sanity-check: make sure every critical tool is actually present before
      # we invest 15+ minutes in a build that would fail at the last step.
      - name: Verify toolchain
        shell: msys2 {0}
        run: |
          set -euo pipefail
          echo "=== GCC ===" && gcc --version
          echo "=== CMake ===" && cmake --version
          echo "=== Ninja ===" && ninja --version
          echo "=== windeployqt ===" && which windeployqt
          echo "=== makensis ===" && which makensis
          echo "All tools present."

      - name: Force Qt5 by removing Qt6 cmake files
        shell: msys2 {0}
        run: rm -rf /ucrt64/lib/cmake/Qt6

      # -----------------------------------------------------------------------
      # CMake / Ninja build
      # -----------------------------------------------------------------------
      - name: Build with cmake
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/ucrt64 \
            -DQt5_DIR=/ucrt64/lib/cmake/Qt5 \
            -DQT_VERSION_MAJOR=5 \
            -DCMAKE_DISABLE_FIND_PACKAGE_Qt6=ON \
            -DBUILD_TESTING=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ..
          ninja

      # Guard: fail loudly if the executable was not produced.
      - name: Verify build output
        shell: msys2 {0}
        run: |
          set -euo pipefail
          EXE="$GITHUB_WORKSPACE/build/qelectrotech.exe"
          if [ ! -f "$EXE" ]; then
            echo "ERROR: $EXE not found. Build step did not produce an executable."
            exit 1
          fi
          echo "Build output OK: $EXE ($(du -h "$EXE" | cut -f1))"

      # -----------------------------------------------------------------------
      # Deployment / packaging
      #
      # FIX: windeployqt is a native Windows tool; it cannot accept MSYS2-style
      # paths (/c/Users/…).  We must convert every path with cygpath -w before
      # passing it to windeployqt.  This was the root cause of exit code 1.
      # -----------------------------------------------------------------------
      - name: Deploy with windeployqt
        shell: msys2 {0}
        run: |
          set -euo pipefail

          # ── Directory layout expected by QET64.nsi ────────────────────────
          # nsis_root/
          #   files/
          #     bin/   ← QElectroTech.exe + DLLs + Qt plugins
          #     elements/  lang/  titleblocks/  examples/  fonts/  ico/
          #     LICENSE  ChangeLog  CREDIT  README  ELEMENTS.LICENSE
          #     qet_uninstall_file_associations.reg  register_filetypes.bat
          #   images/          ← wizard.bmp + header.bmp for the NSIS UI
          #   lang_extra*.nsh
          #   Lancer QET.bat
          #   QET64.nsi
          # ─────────────────────────────────────────────────────────────────

          NSIS_ROOT="$GITHUB_WORKSPACE/nsis_root"
          FILES="$NSIS_ROOT/files"
          BIN="$FILES/bin"
          mkdir -p "$BIN"

          # 1. Executable
          cp "$GITHUB_WORKSPACE/build/qelectrotech.exe" "$BIN/QElectroTech.exe"

          # 2. DLLs + Qt plugins via windeployqt
          #    FIX: convert MSYS2 paths → Windows native paths with cygpath -w
          WIN_BIN=$(cygpath -w "$BIN")
          WIN_EXE="$WIN_BIN\\QElectroTech.exe"
          echo "windeployqt target dir : $WIN_BIN"
          echo "windeployqt executable : $WIN_EXE"
          windeployqt \
            --release \
            --no-translations \
            --no-compiler-runtime \
            --dir "$WIN_BIN" \
            "$WIN_EXE"

          # 3. MinGW runtimes (not handled by windeployqt)
          cp /ucrt64/bin/libgcc_s_seh-1.dll  "$BIN/"
          cp /ucrt64/bin/libstdc++-6.dll     "$BIN/"
          cp /ucrt64/bin/libwinpthread-1.dll "$BIN/"

          # 4. KDE Frameworks DLLs
          cp /ucrt64/bin/KF5*.dll "$BIN/" || echo "Warning: no KF5 DLLs found"

          # 5. SQLite runtime
          cp /ucrt64/bin/libsqlite3-0.dll "$BIN/" || echo "Warning: libsqlite3-0.dll not found"

          # 6. Application data — fail loudly if mandatory dirs are missing
          for dir in elements lang titleblocks; do
            SRC="$GITHUB_WORKSPACE/$dir"
            if [ ! -d "$SRC" ]; then
              echo "ERROR: mandatory directory '$dir' not found in workspace."
              exit 1
            fi
            cp -r "$SRC" "$FILES/$dir"
          done

          # Optional dirs — warn but do not abort
          for dir in examples fonts ico; do
            SRC="$GITHUB_WORKSPACE/$dir"
            if [ -d "$SRC" ]; then
              cp -r "$SRC" "$FILES/$dir"
            else
              echo "Warning: optional directory '$dir' not found — skipping."
            fi
          done

          # 7. Text files expected by QET64.nsi
          for f in LICENSE ChangeLog CREDIT README ELEMENTS.LICENSE \
                   qet_uninstall_file_associations.reg register_filetypes.bat; do
            SRC="$GITHUB_WORKSPACE/$f"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$FILES/$f"
            else
              echo "Warning: $f not found — skipping."
            fi
          done

          # 8. NSIS script + helper .nsh files
          NSI_SRC="$GITHUB_WORKSPACE/build-aux/windows"
          cp "$NSI_SRC/QET64.nsi" "$NSIS_ROOT/"
          for nsh in lang_extra.nsh lang_extra_fr.nsh lang_extra_missing.nsh; do
            [ -f "$NSI_SRC/$nsh" ] && cp "$NSI_SRC/$nsh" "$NSIS_ROOT/" \
              || echo "Warning: $nsh not found."
          done

          # 9. NSIS UI images (wizard.bmp, header.bmp)
          if [ -d "$NSI_SRC/images" ]; then
            cp -r "$NSI_SRC/images" "$NSIS_ROOT/"
          else
            echo "Warning: build-aux/windows/images/ not found."
          fi

          # 10. Launch script expected by QET64.nsi (placed at nsis_root level)
          LAUNCHER_SRC="$NSI_SRC/Lancer QET.bat"
          if [ -f "$LAUNCHER_SRC" ]; then
            cp "$LAUNCHER_SRC" "$NSIS_ROOT/Lancer QET.bat"
          else
            echo "Generating fallback 'Lancer QET.bat'..."
            printf '@echo off\r\nstart "" "%%~dp0bin\\QElectroTech.exe" %%*\r\n' \
              > "$NSIS_ROOT/Lancer QET.bat"
          fi

          echo "=== Deployment layout ==="
          find "$NSIS_ROOT" -maxdepth 3 | sort

      # -----------------------------------------------------------------------
      # Version detection & NSIS patch
      # -----------------------------------------------------------------------
      - name: Extract version for installer name
        shell: msys2 {0}
        id: qet_version
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 'project.*VERSION' "$GITHUB_WORKSPACE/CMakeLists.txt" \
            | grep -oP '[\d]+\.[\d]+[\w\+\-\.]*' | head -1 || echo "dev")
          GIT_SHORT=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          FULL_VERSION="${VERSION}+git${GIT_SHORT}_x86_64-win64"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $FULL_VERSION"

      - name: Patch SOFT_VERSION in QET64.nsi
        shell: msys2 {0}
        run: |
          set -euo pipefail
          VERSION="${{ steps.qet_version.outputs.version }}"
          NSI="$GITHUB_WORKSPACE/nsis_root/QET64.nsi"
          sed -i "s|!define SOFT_VERSION .*|!define SOFT_VERSION \"${VERSION}\"|" "$NSI"
          echo "Patched SOFT_VERSION:"
          grep 'SOFT_VERSION' "$NSI"

      # -----------------------------------------------------------------------
      # NSIS installer build
      # -----------------------------------------------------------------------
      - name: Build NSIS installer
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/nsis_root"
          makensis QET64.nsi
          echo "=== Produced installers ==="
          ls -lh Installer_QElectroTech-*.exe

      - name: Move installer to dist/
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"
          mv "$GITHUB_WORKSPACE/nsis_root"/Installer_QElectroTech-*.exe \
             "$GITHUB_WORKSPACE/dist/"
          echo "=== dist/ contents ==="
          ls -lh "$GITHUB_WORKSPACE/dist/"

      # -----------------------------------------------------------------------
      # Artifact uploads
      # -----------------------------------------------------------------------
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          # Broadened glob — catches logs whether CMake ran or not
          path: |
            build/CMakeFiles/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeConfigureLog.yaml
          if-no-files-found: warn

      - name: Upload portable build (files/ without installer)
        uses: actions/upload-artifact@v4
        with:
          name: qelectrotech-windows-portable
          path: nsis_root/files/
          retention-days: 14

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: qelectrotech-windows-installer
          path: dist/Installer_QElectroTech-*.exe
          retention-days: 14
